name: Theme Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  theme-check:
    name: Shopify Theme Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Relatório completo nos logs; falha de job apenas em severidade "crash"
      # (o tema ainda acumula ofensas "error" herdadas — endurecer para --fail-level error após correção).
      - name: Run Theme Check
        uses: shopify/theme-check-action@v2
        with:
          theme_root: "."
          token: ${{ github.token }}
          base: main
          flags: "--fail-level crash"
